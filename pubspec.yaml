name: mejlis_digital_hub
description: "Mejlis Digital Hub — Zakat & Awqaf."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  provider: ^6.1.5
  equatable: ^2.0.7
  go_router: ^14.8.1
  get_it: ^8.2.0
  injectable: ^2.5.2
  dio: ^5.9.0
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_config:
    path: packages/flutter_config
  url_launcher: ^6.3.2
  persistent_bottom_nav_bar_v2: ^6.3.2
  image_picker: ^1.2.2
  pdf: ^3.12.0
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  cross_file: ^0.3.5+2
  shared_preferences: ^2.5.3
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/static/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/static/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/static/Roboto-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/static/Roboto-Bold.ttf
          weight: 700
